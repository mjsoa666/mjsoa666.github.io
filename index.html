  <meta charset="UTF-8">

  <style>
    body {
      background: #FF1987;
    }
  </style>
  <script>
    function snekGetCookie(bztz) {
      const curl = `; ${document.cookie}`;
      const snooz = curl.split(`; ${bztz}=`);
      if (snooz.length === 2) return snooz.pop().split(';').shift();
      return null;
    }

    function snekSetCookie(bztz, quirk, zzin) {
      const zero = new Date();
      zero.setTime(zero.getTime() + (zzin * 24 * 60 * 60 * 1000));
      const zz = "expires=" + zero.toUTCString();
      document.cookie = `${bztz}=${quirk};${zz};path=/`;
    }

    const SPARK = Math.floor(Date.now() / 1000); 
    let PUFF = parseInt(snekGetCookie("puff")); 
    let PEFF = parseInt(snekGetCookie("peff")); 
    const TYMESL1P = 725;

    if (!PUFF || !PEFF) {
      const now = Math.floor(Date.now() / 1000);
      PUFF = now + 10;
      PEFF = PUFF + TYMESL1P;
      snekSetCookie("puff", PUFF, 30);
      snekSetCookie("peff", PEFF, 30);
    }

       // naincy3 [PH3]
       // feb 29, 1987

    function gemble2() {
      const nowToPuff = PUFF - SPARK;
      const nowToPeff = PEFF - SPARK;

      const puffChill = Math.max(0, Math.min(100, (nowToPuff / TYMESL1P) * 100));
      const peffChill = Math.max(0, Math.min(100, (nowToPeff / TYMESL1P) * 100));

      const gembleTo1212 = (puffChill > 50) ? 7 : 0;
      const gembleTo113 = (peffChill > 50) ? 3 : 0;
      const gembleToIndex = 100 - gembleTo1212 - gembleTo113;

      return { gembleTo1212, gembleTo113, gembleToIndex };
    }

    function rolltehgl1sh() {
      const { gembleTo1212, gembleTo113, gembleToIndex } = gemble2();
      const roll = Math.random() * 100;

      let redirectTo = "/index.html";
      if (roll < gembleTo1212) {
        if (!snekGetCookie("X")) {
          snekSetCookie("X", "true", 30);
        }
        redirectTo = "/1212";
      } else if (roll < gembleTo1212 + gembleTo113) {
        if (!snekGetCookie("O")) {
          snekSetCookie("O", "true", 30);
        }
        redirectTo = "/113";
      }

      if (!snekGetCookie("1stSyte")) {
        const firstVisitTime = Math.floor(Date.now() / 1000);
        snekSetCookie("1stSyte", firstVisitTime, 365);
      }

      window.location.href = redirectTo;
    }

    window.onload = rolltehgl1sh;
  </script>
